<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>CTtransit</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --brand-green: #049869; 
            --text-grey: #666;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
            background-color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
        }

        .nav-bar {
            height: 44px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 0 20px;
            padding-top: env(safe-area-inset-top);
        }

        .close-btn { 
            font-size: 20px; 
            color: #000; 
            background: #f4f4f4; 
            width: 32px; 
            height: 32px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 50%;
            font-weight: bold;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-bottom: env(safe-area-inset-bottom);
            box-sizing: border-box;
        }

        .header-section { 
            width: 90%; 
            margin-top: 10px; 
            margin-bottom: 20px; 
        }
        
        .header-section h1 { margin: 0; font-size: 26px; font-weight: 700; color: #333; letter-spacing: -0.5px; }
        .header-section p { margin: 2px 0 0; color: var(--text-grey); font-size: 16px; }

        .security-graphic {
            position: relative;
            width: 100%;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 50px; 
            margin-bottom: 50px; 
        }

        .breathing-ring {
            width: 160px; 
            height: 160px;
            border-radius: 50%;
            border-style: solid;
            border-color: var(--brand-green);
            display: flex;
            justify-content: center;
            align-items: center;
            animation: stretch-border 1.2s ease-in-out infinite alternate;
        }

        @keyframes stretch-border {
            0% { border-width: 15px; }
            100% { border-width: 45px; margin: -30px; }
        }

        .logo-static {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            background: white;
            width: 94px;
            height: 94px;
            border-radius: 50%;
            box-shadow: 0 1px 6px rgba(0,0,0,0.1);
        }

        .globe-img { width: 12px; height: 12px; margin-right: 3px; }
        .logo-txt { color: #000; font-weight: 800; font-style: italic; font-size: 13px; letter-spacing: -0.2px; }

        /* Your requested clock style applied exactly */
        .clock-display { 
            font-size: 56px; 
            font-weight: 650; 
            letter-spacing: -1.5px; 
            color: #333; 
            margin: 0; 
            line-height: 1;
        }

        .info-card {
            width: 90%;
            border: 1px solid #eeeeee;
            border-radius: 4px;
            padding: 22px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
            box-sizing: border-box;
            margin-top: 25px; 
        }

        .ticket-title { font-size: 22px; font-weight: 400; margin-bottom: 8px; color: #333; }
        .region-list { font-size: 13px; color: #888; line-height: 1.4; margin-bottom: 35px; }
        .expiry-line { font-size: 17px; font-weight: 700; color: #666; }

    </style>
</head>
<body>

    <div class="nav-bar">
        <div class="close-btn">&times;</div>
    </div>

    <div class="main-content">
        <div class="header-section">
            <h1>CTtransit</h1>
            <p>Show operator your ticket</p>
        </div>

        <div class="security-graphic">
            <div class="logo-static">
                <svg class="globe-img" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="48" fill="#1a305e"/>
                    <path d="M10,50 Q50,20 90,50 Q50,80 10,50" fill="none" stroke="white" stroke-width="4"/>
                </svg>
                <div class="logo-txt">CT transit</div>
            </div>
            <div class="breathing-ring"></div>
        </div>

        <div class="clock-display" id="clock-live">--:--:-- --</div>

        <div class="info-card">
            <div class="ticket-title">Adult 2 Hour - Local Service</div>
            <div class="region-list">
                Hartford, New Haven, Stamford, Bristol, Meriden, New Britain, Wallingford, and Waterbury
            </div>
            <div class="expiry-line" id="expiry-auto">Expires -- --, ---- at --:-- --</div>
        </div>
    </div>

    <script>
        function runTicket() {
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            let seconds = now.getSeconds();
            let ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12; 
            minutes = minutes < 10 ? '0'+minutes : minutes;
            seconds = seconds < 10 ? '0'+seconds : seconds;
            
            document.getElementById('clock-live').textContent = hours + ':' + minutes + ':' + seconds + ' ' + ampm;

            const exp = new Date(now.getTime() + (2 * 60 * 60 * 1000));
            let expHours = exp.getHours();
            let expMinutes = exp.getMinutes();
            let expAmpm = expHours >= 12 ? 'PM' : 'AM';
            expHours = expHours % 12;
            expHours = expHours ? expHours : 12;
            expMinutes = expMinutes < 10 ? '0'+expMinutes : expMinutes;

            const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            document.getElementById('expiry-auto').textContent = `Expires ${months[exp.getMonth()]} ${exp.getDate()}, ${exp.getFullYear()} at ${expHours}:${expMinutes} ${expAmpm}`;
        }
        setInterval(runTicket, 1000);
        runTicket();

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
